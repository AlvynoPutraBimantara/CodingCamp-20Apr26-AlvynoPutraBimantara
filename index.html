<body>
  <div class="container">
    <!-- HEADER -->
    <div class="card header">
      <h1 id="time">10:45:22</h1>
      <p id="date">Tuesday, January 27, 2026</p>
      <h2 id="greeting">Good Morning</h2>
    </div>

    <!-- TIMER -->
    <div class="card">
      <h3>Focus Timer</h3>
      <h1 id="timer">25:00</h1>
      <button id="start">Start</button>
      <button id="stop">Stop</button>
      <button id="reset">Reset</button>
    </div>

    <!-- TASKS -->
    <div class="card">
      <h3>Tasks</h3>
      <input id="taskInput" placeholder="Add a new task..." />
      <button id="addTask">Add</button>
      <ul id="taskList"></ul>
    </div>

    <!-- QUICK LINKS -->
    <div class="card">
      <h3>Quick Links</h3>
      <input id="linkName" placeholder="Name" />
      <input id="linkURL" placeholder="URL" />
      <button id="addLink">Add Link</button>
      <div id="linksContainer"></div>
    </div>
  </div>
</body>
